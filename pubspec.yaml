name: fover
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  freebox:
    path: packages/freebox/
    
  flutter:
    sdk: flutter
  cupertino_native_better: ^1.4.2
  cupertino_icons: ^1.0.8
  # freebox: ^1.0.3
  flutter_phoenix: ^1.1.1
  super_drag_and_drop: ^0.9.1 
  super_context_menu: ^0.9.1
  cached_network_image: ^3.4.1
  share_plus: ^12.0.1
  local_auth: ^3.0.0
  # camerawesome: ^2.5.0
  flutter_image_compress: ^2.4.0
  extended_image: ^10.0.1
  path_provider: ^2.1.5
  gradient_progress_bar: ^1.0.7
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  video_thumbnail: ^0.5.6
  clipboard: ^3.0.14
  exif: ^3.3.0
  intl: ^0.20.2
  cupertino_calendar_picker: ^2.2.6
  apple_maps_flutter: ^1.4.0
  pull_down_button: ^0.10.2
  flutter_native_splash: ^2.4.7
  http_parser: ^4.1.2
  mime: ^2.0.0
  wechat_assets_picker: ^10.1.1
  pro_image_editor: ^12.0.13
  dio: ^5.9.2
  video_player: ^2.11.1
  pro_video_editor: ^1.14.4
  app_settings: ^7.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  hive_ce_generator: ^1.11.1
  build_runner: ^2.4.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/illustrations/
    - assets/illustrations/freebox/
  
flutter_native_splash:
  color: '#FFFFFF'
  color_dark: '#000000'

  image: assets/icon.png
  image_dark: assets/dark_icon.png
