name: fover
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  freebox:
    path: packages/freebox/
    
  flutter:
    sdk: flutter
  cupertino_native_better: ^1.3.1
  cupertino_icons: ^1.0.8
  # freebox: ^1.0.3
  flutter_phoenix: ^1.1.1
  super_drag_and_drop: ^0.9.1 
  super_context_menu: ^0.9.1
  cached_network_image: ^3.4.1
  share_plus: ^12.0.1
  local_auth: ^3.0.0
  # camerawesome: ^2.5.0
  flutter_image_compress: ^2.4.0
  extended_image: ^10.0.1
  path_provider: ^2.1.5
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  gradient_progress_bar: ^1.0.7
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  video_thumbnail: ^0.5.6
  clipboard: ^3.0.14
  image_picker: ^1.2.1
  exif: ^3.3.0

dev_dependencies:
  hive_ce_generator: ^1.11.1
  build_runner: ^2.4.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/illustrations/
    - assets/illustrations/freebox/
